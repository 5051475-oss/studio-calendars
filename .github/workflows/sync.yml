name: Auto-Sync Google Calendars

on:
  schedule:
    - cron: '*/5 * * * *' # Запускается каждые 5 минут
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  update-calendars:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Убирает системное предупреждение GitHub про Node.js 20
    permissions:
      contents: write # Разрешение боту сохранять файлы в ваш репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ICS files from Google
        run: |
          # Создаем папку data, если ее еще нет
          mkdir -p data
          
          # Скачиваем календари (добавлен ?t=$(date +%s) для обхода жесткого кэширования самого Google)
          curl -sL "https://calendar.google.com/calendar/ical/236afe95b2cd8facba15e35d569979621af0f1fb73bc90e1e5451d786a4a54e8@group.calendar.google.com/public/basic.ics?t=$(date +%s)" -o data/calendar1.ics
          curl -sL "https://calendar.google.com/calendar/ical/4d3f00f65b87d7f22482c82a966378ff5f48a85a2e310b14e79eee598e4e3e0c@group.calendar.google.com/public/basic.ics?t=$(date +%s)" -o data/calendar2.ics
          curl -sL "https://calendar.google.com/calendar/ical/e230r725c41i7ilm02m3ep04t0@group.calendar.google.com/public/basic.ics?t=$(date +%s)" -o data/calendar3.ics

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git commit -m "Auto-update calendars with cache bypass" || echo "No changes to commit"
          git push
